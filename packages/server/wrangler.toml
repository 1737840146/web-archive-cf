name = "web-archive"
pages_build_output_dir = "../../dist/service"
compatibility_flags = [ "nodejs_compat_v2" ]
compatibility_date = "2024-10-21"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "web-archive"

[[d1_databases]]
binding = "DB"
database_name = "web-archive"
database_id = "c091d624-2c0b-44a4-a24c-16b8d4b0eed7"
migrations_dir = './src/sql/migrations'

[ai]
binding = "AI"
